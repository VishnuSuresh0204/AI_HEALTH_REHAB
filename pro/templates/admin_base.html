<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard - AI Healthcare{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --bg-overlay: rgba(255, 255, 255, 0.9);
            --text-main: #1f2937;
            --text-light: #4b5563;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            height: 100%;
            /* Different background for admin */
            background: url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
        }

        /* Navbar Styling */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 3rem;
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand a {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-nav {
            display: flex;
            list-style: none;
            gap: 1.5rem;
            margin: 0;
            padding: 0;
        }

        .navbar-nav a {
            text-decoration: none;
            color: #d1d5db;
            font-weight: 600;
            transition: color 0.3s;
        }

        .navbar-nav a:hover {
            color: var(--primary);
        }

        .btn-danger {
            background-color: #ef4444;
            color: white !important;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-danger:hover {
            background-color: #dc2626;
        }

        /* Content Container */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            min-height: calc(100vh - 150px);
        }

        /* Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Alerts */
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .alert-error { background-color: #fee2e2; color: #991b1b; }
        .alert-success { background-color: #d1fae5; color: #065f46; }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        th {
            background-color: #f9fafb;
            font-weight: 700;
            color: #374151;
        }
        tr:hover {
            background-color: #f3f4f6;
        }
        .btn-action {
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
            color: white;
        }
        .btn-approve { background-color: var(--primary); }
        .btn-reject { background-color: #ef4444; }
        .btn-block { background-color: #f59e0b; }
        .btn-unblock { background-color: #3b82f6; }

    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">
            <a href="/admin_home/">🛡️ Admin Dashboard</a>
        </div>
        <ul class="navbar-nav">
            <li><a href="/admin_home/">Dashboard</a></li>
            <li><a href="/admin_view_users/">View Users</a></li>
            <li><a href="/admin_view_therapists/">View Therapists</a></li>
            <li><a href="/admin_view_exercises/">View Exercises</a></li>
            <li><a href="/signout/" class="btn-danger">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="glass-card">
            {% block content %}
            {% endblock %}
        </div>
    </div>

</body>
</html>

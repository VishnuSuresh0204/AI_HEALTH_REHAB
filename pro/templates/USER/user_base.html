<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Patient Portal - AI Healthcare{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text-main: #1f2937;
            --text-light: #4b5563;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-main); height: 100%;
            background: url('https://images.unsplash.com/photo-1576091160550-2173ff9e5eb3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
        }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 3rem;
            background: rgba(37, 99, 235, 0.92);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
            position: sticky; top: 0; z-index: 1000;
        }
        .navbar-brand a {
            font-size: 1.5rem; font-weight: 700; color: #fff;
            text-decoration: none; display: flex; align-items: center; gap: 0.5rem;
        }
        .navbar-nav { display: flex; list-style: none; gap: 1.5rem; margin: 0; padding: 0; }
        .navbar-nav a { text-decoration: none; color: rgba(255,255,255,0.85); font-weight: 600; transition: color 0.3s; }
        .navbar-nav a:hover { color: #fff; }
        .btn-danger {
            background-color: #ef4444; color: white !important;
            padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; transition: background 0.3s;
        }
        .btn-danger:hover { background-color: #dc2626; }
        .btn-primary {
            background-color: #fff; color: var(--primary) !important;
            padding: 0.5rem 1rem; border-radius: 6px; font-weight: 700; transition: all 0.3s;
        }
        .btn-primary:hover { background-color: #e0e7ff; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; min-height: calc(100vh - 150px); }
        .glass-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(16px); border-radius: 12px; padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.2);
        }
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; font-weight: 600; }
        .alert-error { background-color: #fee2e2; color: #991b1b; }
        .alert-success { background-color: #d1fae5; color: #065f46; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid #e5e7eb; }
        th { background-color: #f9fafb; font-weight: 700; color: #374151; }
        tr:hover { background-color: #f3f4f6; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: var(--text-light); }
        .form-control {
            width: 100%; padding: 0.75rem; border: 1px solid #d1d5db;
            border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 1rem;
        }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
        textarea.form-control { resize: vertical; min-height: 90px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="/user_home">🏥 Patient Portal</a>
        </div>
        <ul class="navbar-nav">
            <li><a href="/user_home">Home</a></li>
            <li><a href="/user_view_plans">My Plans</a></li>
            <li><a href="/user_medical_history">Medical History</a></li>
            <li><a href="/signout" class="btn-danger">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        <div class="glass-card">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>

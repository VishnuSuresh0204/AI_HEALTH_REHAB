{% extends 'base.html' %}

{% block title %}Login - AI Healthcare{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
    }
    .auth-card {
        width: 100%;
        max-width: 400px;
    }
    .auth-card h2 {
        text-align: center;
        margin-bottom: 2rem;
        color: var(--primary);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card">
        <h2>Welcome Back</h2>
        <form method="POST" action="/login/">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-primary" style="padding: 0.75rem; font-size: 1.1rem; margin-top: 1.5rem;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
            Don't have an account? <br>
            <a href="/register_user/" style="color: var(--primary); text-decoration: none; font-weight: 600;">Register as Patient</a> or 
            <a href="/register_therapist/" style="color: var(--primary); text-decoration: none; font-weight: 600;">Therapist</a>
        </p>
    </div>
</div>
{% endblock %}

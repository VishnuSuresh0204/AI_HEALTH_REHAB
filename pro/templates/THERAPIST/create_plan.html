{% extends "THERAPIST/therapist_base.html" %}

{% block title %}Create Plan – {{ patient.name }}{% endblock %}

{% block extra_css %}
<style>
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-light); }
    .form-control {
        width: 100%; padding: 0.75rem; border: 1px solid #d1d5db;
        border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 1rem;
    }
    .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(139,92,246,0.2); }
    .full-span { grid-column: 1 / -1; }
    textarea.form-control { resize: vertical; min-height: 100px; }
    .submit-btn {
        margin-top: 1.5rem; background: var(--primary); color: white; border: none;
        padding: 0.85rem 2.5rem; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer;
        transition: background 0.2s;
    }
    .submit-btn:hover { background: var(--primary-hover); }
</style>
{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
    <a href="/therapist_patient_detail/?id={{ patient.id }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Back to {{ patient.name }}</a>
</div>

<h2 style="margin: 0 0 0.5rem;">Create Exercise Plan</h2>
<p style="margin: 0 0 2rem; color: var(--text-light);">Designing a plan for <strong>{{ patient.name }}</strong></p>

<form method="POST">
    {% csrf_token %}
    <div class="form-grid">
        <div class="form-group full-span">
            <label for="plan-title">Plan Title *</label>
            <input type="text" id="plan-title" name="title" class="form-control" placeholder="e.g. Knee Rehabilitation Phase 1" required>
        </div>
        <div class="form-group full-span">
            <label for="plan-goal">Goal / Description</label>
            <textarea id="plan-goal" name="goal" class="form-control" placeholder="Describe the rehabilitation goal for this plan..."></textarea>
        </div>
        <div class="form-group">
            <label for="start-date">Start Date</label>
            <input type="date" id="start-date" name="start_date" class="form-control">
        </div>
        <div class="form-group">
            <label for="end-date">End Date</label>
            <input type="date" id="end-date" name="end_date" class="form-control">
        </div>
    </div>
    <button type="submit" class="submit-btn">Create Plan & Add Exercises →</button>
</form>
{% endblock %}

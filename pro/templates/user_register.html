{% extends 'base.html' %}

{% block title %}Patient Registration - AI Healthcare{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
        padding: 2rem 0;
    }
    .auth-card {
        width: 100%;
        max-width: 600px;
    }
    .auth-card h2 {
        text-align: center;
        margin-bottom: 2rem;
        color: var(--primary);
    }
    .form-row {
        display: flex;
        gap: 1rem;
    }
    .form-row .form-group {
        flex: 1;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card">
        <h2>Patient Registration</h2>
        <form method="POST" action="/register_user/" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-row">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" name="name" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" name="email" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" class="form-control" name="phone" required>
                </div>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea class="form-control" name="address" rows="2" required></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Gender</label>
                    <select class="form-control" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" class="form-control" name="dob" required>
                </div>
            </div>

            <div class="form-group">
                <label>Assign a Therapist (Optional)</label>
                <select class="form-control" name="therapist">
                    <option value="">None</option>
                    {% for t in therapists %}
                        <option value="{{ t.id }}">{{ t.name }} - {{ t.specialization }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Profile Picture</label>
                <input type="file" class="form-control" name="profile_pic" accept="image/*">
            </div>

            <button type="submit" class="btn-primary" style="padding: 0.75rem; font-size: 1.1rem; margin-top: 1rem;">Register</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
            Already registered? <a href="/login/" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}

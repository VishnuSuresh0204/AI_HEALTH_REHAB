{% extends 'admin_base.html' %}

{% block title %}Add Exercise - AI Healthcare{% endblock %}

{% block extra_css %}
<style>
    .form-row {
        display: flex;
        gap: 1.5rem;
        margin-bottom: 1rem;
    }
    .form-group {
        flex: 1;
        margin-bottom: 1rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--text-main);
    }
    .form-control {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        box-sizing: border-box;
        font-family: inherit;
    }
</style>
{% endblock %}

{% block content %}
<div style="margin-bottom: 1.5rem;">
    <h2 style="margin: 0; color: var(--primary);">Add New Exercise</h2>
</div>

<form method="POST" action="/admin_add_exercise/" enctype="multipart/form-data">
    {% csrf_token %}
    
    <div class="form-row">
        <div class="form-group">
            <label>Exercise Name</label>
            <input type="text" class="form-control" name="name" required>
        </div>
        <div class="form-group">
            <label>Body Part</label>
            <input type="text" class="form-control" name="body_part" required placeholder="e.g. Knee, Shoulder">
        </div>
    </div>

    <div class="form-group">
        <label>Description</label>
        <textarea class="form-control" name="description" rows="3" required></textarea>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Target Angle Min (&deg;)</label>
            <input type="number" class="form-control" name="target_angle_min" required>
        </div>
        <div class="form-group">
            <label>Target Angle Max (&deg;)</label>
            <input type="number" class="form-control" name="target_angle_max" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Default Reps</label>
            <input type="number" class="form-control" name="default_reps" value="10" required>
        </div>
        <div class="form-group">
            <label>Default Sets</label>
            <input type="number" class="form-control" name="default_sets" value="3" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Demo Video</label>
            <input type="file" class="form-control" name="demo_video" accept="video/*">
        </div>
        <div class="form-group">
            <label>Thumbnail</label>
            <input type="file" class="form-control" name="thumbnail" accept="image/*">
        </div>
    </div>

    <div style="margin-top: 1rem;">
        <button type="submit" class="btn-action btn-approve" style="padding: 0.75rem 2rem; border: none; font-size: 1rem; cursor: pointer;">Save Exercise</button>
        <a href="/admin_view_exercises" style="margin-left: 1rem; color: var(--text-light); text-decoration: none;">Cancel</a>
    </div>
</form>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Therapist Registration - AI Healthcare{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
        padding: 2rem 0;
    }
    .auth-card {
        width: 100%;
        max-width: 600px;
    }
    .auth-card h2 {
        text-align: center;
        margin-bottom: 2rem;
        color: var(--primary);
    }
    .form-row {
        display: flex;
        gap: 1rem;
    }
    .form-row .form-group {
        flex: 1;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card">
        <h2>Therapist Registration</h2>
        <form method="POST" action="/register_therapist/" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-row">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" name="name" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" name="email" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" class="form-control" name="phone" required>
                </div>
            </div>

            <div class="form-group">
                <label>Specialization</label>
                <input type="text" class="form-control" name="specialization" required placeholder="e.g. Clinical Psychologist">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>License Number</label>
                    <input type="text" class="form-control" name="license_number" required>
                </div>
                <div class="form-group">
                    <label>Years of Experience</label>
                    <input type="number" class="form-control" name="years_of_experience" min="0" required>
                </div>
            </div>

            <div class="form-group">
                <label>Profile Picture</label>
                <input type="file" class="form-control" name="profile_pic" accept="image/*">
            </div>

            <button type="submit" class="btn-primary" style="padding: 0.75rem; font-size: 1.1rem; margin-top: 1rem;">Register</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
            Already registered? <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
